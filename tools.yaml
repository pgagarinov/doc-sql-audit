kind: tools
name: supplier-similar-subjects
type: postgres-sql
source: doc-sql-audit-pg
description: |
  Find pairs of contracts from the same supplier with similar subjects
  using PostgreSQL trigram similarity (pg_trgm). Returns pairs with
  similarity score > 0.3, useful for detecting potential contract splitting.
statement: |
  SELECT c1.contract_number AS contract_1,
         c2.contract_number AS contract_2,
         c1.supplier,
         c1.subject AS subject_1,
         c2.subject AS subject_2,
         similarity(c1.subject, c2.subject) AS sim_score,
         c1.amount + c2.amount AS combined_amount
  FROM contracts c1
  JOIN contracts c2
    ON c1.supplier = c2.supplier
    AND c1.contract_id < c2.contract_id
    AND similarity(c1.subject, c2.subject) > 0.3
  ORDER BY c1.supplier, sim_score DESC
  LIMIT 500;
---
kind: tools
name: supplier-subject-summary
type: postgres-sql
source: doc-sql-audit-pg
description: |
  Group contracts by supplier and subject where the supplier has multiple
  contracts with similar subjects (trigram similarity > 0.3). Shows aggregated
  totals per supplier/subject combination, useful for identifying systematic
  contract splitting patterns.
statement: |
  WITH similar_pairs AS (
      SELECT c1.supplier,
             c1.subject,
             c1.contract_id, c1.contract_number, c1.amount
      FROM contracts c1
      WHERE EXISTS (
          SELECT 1 FROM contracts c2
          WHERE c2.supplier = c1.supplier
            AND c2.contract_id != c1.contract_id
            AND similarity(c1.subject, c2.subject) > 0.3
      )
  )
  SELECT supplier,
         subject,
         string_agg(contract_number, ', ' ORDER BY contract_number) AS contract_numbers,
         SUM(amount) AS total_amount,
         COUNT(*) AS contract_count
  FROM similar_pairs
  GROUP BY supplier, subject
  ORDER BY total_amount DESC
  LIMIT 200;
